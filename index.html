<html lang="hi"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css"></head>
<body class="locked">
<div class="lock-screen" id="lock-screen">
  <form class="lock-card" id="lock-form">
    <div class="lock-icon"><i class="ti ti-lock"></i></div>
    <h2>Contacts Locked</h2>
    <p>Password डालकर contacts खोलें</p>
    <div class="password-wrap"><i class="ti ti-key"></i><input type="password" id="lock-password" inputmode="numeric" maxlength="4" autocomplete="off" autofocus="" placeholder="••••" aria-label="Enter password"></div>
    <button class="unlock-btn" type="submit"><i class="ti ti-lock-open"></i> Unlock</button>
    <a class="forgot-btn" id="forgot-password" href="tel:+916299510063"><i class="ti ti-phone-call"></i> Forgot password? Dipak Kumar को call करें</a>
    <div class="lock-error" id="lock-error"></div>
  </form>
</div>
<div class="app">
  <div class="header">
    <h1><i class="ti ti-address-book"></i> My Contacts</h1>
    <p id="total"></p>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="नाम या नंबर खोजें…" autocomplete="off">
    </div>
    <button class="btn" id="settings-btn"><i class="ti ti-settings"></i> Settings</button>
  </div>
  <div class="panel" id="panel">
    <h3>Theme &amp; Display</h3>
    <div style="margin-bottom:12px">
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px">Accent color चुनें</p>
      <div class="theme-grid" id="theme-grid"></div>
    </div>
    <div class="feature-grid">
      <label class="toggle-row">Favorites <input type="checkbox" id="feature-favorites" checked=""></label>
      <label class="toggle-row">Right A-Z <input type="checkbox" id="feature-index" checked=""></label>
      <label class="toggle-row">Contact photos <input type="checkbox" id="feature-photos" checked=""></label>
      <label class="toggle-row">Letter groups <input type="checkbox" id="feature-groups" checked=""></label>
    </div>
    <button class="btn full-btn" id="fullscreen-btn" type="button"><i class="ti ti-maximize"></i> Full screen</button>
    <div class="slider-row"><label>Font size</label><input type="range" min="12" max="20" value="15" step="1" id="fs"><span class="slider-val" id="fs-v">15px</span></div>
    <div class="slider-row"><label>Card spacing</label><input type="range" min="2" max="16" value="6" step="2" id="sp"><span class="slider-val" id="sp-v">6px</span></div>
  </div>
  <div class="profile-card" id="profile-card">
    <div class="avatar profile-photo" id="profile-avatar">D</div>
    <div class="info">
      <div class="name">Dipak Kumar</div>
      <a class="phone" href="tel:+916299510063"><i class="ti ti-phone-call" style="font-size:12px"></i><span id="profile-photo-label">6299510063</span></a>
    </div>
  </div>
  <div class="favorites" id="favorites"></div>
  <div class="alpha-bar" id="alpha-bar"></div>
  <div class="letter-pop" id="letter-pop"></div>
  <div class="count" id="cnt"></div>
  <div id="list"></div>
</div>





<script src="script.js" defer=""></script></body></html>
